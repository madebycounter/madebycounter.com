---
layout: default
title: portfolio
theme: light
---

<div class="content" id="portfolio">
    <h2>Projects</h2>

    <div class="cards">
        {% for item in site.portfolio %}
            <div class="item">
                <img class="layer" src="{{ item.underlay }}"/>
                <img class="layer" src="/assets/img/site/fade.png"/>
                <img class="layer cover" src="{{ item.image }}"/>

                <a class="layer" href="{{ item.url }}">
                    <div class="info">
                        <h3>{{ item.title }}</h3>
                        <p>{{ item.description }}</p>
                    </div>
                </a>

                <p class="arrow">&rarr;</p>
            </div>
        {% endfor %}
    </div>
</div>
