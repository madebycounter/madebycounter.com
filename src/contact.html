---
layout: default
title: contact
theme: light
permalink: /contact/
---

<div class="contact theme-light" id="contact">
    <div class="content">
        <form>
            <div class="flex-title left">
                <div class="title">
                    <h2 id="_lets_talk">Let's<br />Talk.</h2>
                </div>

                <div>
                    {% include tools/content.html
                    data=site.data.content.index.contact %}

                    <div class="form">
                        <div class="input">
                            <input
                                id="_name"
                                type="text"
                                placeholder="Name"
                                name="name"
                            />
                        </div>

                        <div class="input">
                            <input
                                id="_email"
                                type="text"
                                placeholder="Email"
                                name="email"
                            />
                        </div>
                    </div>
                </div>

                <div class="form" style="margin-top: 0">
                    <div class="input" style="margin-top: 0">
                        <textarea id="_msg"></textarea>
                        <label for="_msg" type="text"></label>
                    </div>

                    <input
                        type="hidden"
                        id="_origin"
                        name="origin"
                        value="Contact Page"
                    />

                    <a
                        class="submit"
                        href="#contact"
                        onclick="submitContact('theme-light')"
                        style="float: right"
                        >Submit</a
                    >
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    function letsTalkAdjuster() {
        if (window.innerWidth > 660) {
            $("#_lets_talk").html("Let's<br />Talk.");
        } else {
            $("#_lets_talk").html("Let's Talk.");
        }
    }

    $(window).resize(letsTalkAdjuster);
    $(window).on("load", letsTalkAdjuster);
</script>
