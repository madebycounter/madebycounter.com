---
layout: default
title: blog
theme: light
permalink: /blog/
---

<div class="blog theme-light">
    <div class="content">
        {% for post in site.posts %}
        <div class="post">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
            {% include info.html post=post %} {{ post.content }}
        </div>

        {% if post != site.posts.last %}
        <br /><br />
        {% endif %} {% endfor %}
    </div>
</div>
