splash:
  - >-
    A branding and social media content package cohesively designed to
    balance aesthetics and function.
usability:
  - >-
    All media for the phoenix coalition was designed, produced,
    and delivered in a single day. This is not to say it was
    created without character, form, and functionality in mind.
  - >-
    The logo was delivered in several versions to be utilized in
    a variety of contexts and professional use-cases:
function:
  - >-
    The Instagram page showcased a clear visual aesthetic while
    not compromising the functionality of each post.
  - >-
    Created with the grid structure of Instagram in mind, each
    post either displayed a member of the coalition,
    highlighting information about them and their campaign
    platform, or presented a tenet that the coalition stands for
    with further information in the caption.
