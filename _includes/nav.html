{% assign class = "theme-light" %}
{% assign logo = "black" %}

{% if include.theme == "dark" %}
{% assign class = "theme-dark" %}
{% assign logo = "white" %}
{% endif %}

<div id="nav" class="{{ class }}">
    <div class="logo">
        <a href="/">
            <img src="/assets/img/site/logo_banner_{{ logo }}.png">
        </a>
    </div>

    <div class="links">
        {% for nav in site.data.menu %}
        <a class="notd small {% if nav.name == page.title %}a{% endif %}" href="{{ nav.url }}">{{ nav.name | upcase
            }}</a>
        {% endfor %}
    </div>
</div>
