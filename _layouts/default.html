<!DOCTYPE html>
<html lang="{{ site.lang | default: " en-US" }}">

{% include header.html %}

<body>
    <div>
        {% include nav.html theme=page.theme %}
    </div>

    <div id="main">
        {{ content }}
    </div>

    <script>
        function updateVh() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        window.addEventListener("resize", updateVh);
        updateVh();
    </script>

    {% include footer.html %}
</body>

</html>
