---
layout: default
title: contact
theme: light
---

<div class="theme-light" id="contact">
    <div class="content">
        <div class="flex-title left">
            <div class="title">
                <h2>Let's<br />Talk.</h2>
            </div>

            <div>
                <p>{{ site.data.content.about.contact | markdownify }}</p>

                <div class="form">
                    <div class="input">
                        <input id="_name" type="text" placeholder="Name" />
                    </div>

                    <div class="input">
                        <input id="_email" type="text" placeholder="Email" />
                    </div>
                </div>
            </div>

            <div class="form" style="margin-top: 0">
                <div class="input" style="margin-top: 0">
                    <textarea id="_email"></textarea>
                    <label for="_email" type="text"></label>
                </div>

                <a class="submit" href="#" style="float: right">Submit</a>
            </div>
        </div>
    </div>
</div>
